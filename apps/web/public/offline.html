<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>You’re offline. | Spektra</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8f9fb;
        color: #111827;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #020617;
          color: #f8fafc;
        }
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 0%, rgba(79, 70, 229, 0.22), transparent 280px),
          radial-gradient(circle at 85% 15%, rgba(6, 182, 212, 0.18), transparent 260px),
          var(--page-bg, #f8f9fb);
      }

      @media (prefers-color-scheme: dark) {
        body {
          --page-bg: #020617;
        }
      }

      main {
        width: min(100%, 460px);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 24px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
        backdrop-filter: blur(18px);
      }

      @media (prefers-color-scheme: dark) {
        main {
          background: rgba(15, 23, 42, 0.86);
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
        }
      }

      .brand {
        margin: 0 0 28px;
        font-size: 1.25rem;
        font-weight: 900;
        letter-spacing: 0;
      }

      .brand span {
        color: #06b6d4;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 18px 0 0;
        color: #4b5563;
        font-size: 1rem;
        font-weight: 650;
        line-height: 1.65;
      }

      @media (prefers-color-scheme: dark) {
        p {
          color: #cbd5e1;
        }
      }

      a {
        display: inline-flex;
        min-height: 44px;
        margin-top: 24px;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        background: #4f46e5;
        color: #ffffff;
        padding: 0 18px;
        font-size: 0.95rem;
        font-weight: 800;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 4px solid rgba(79, 70, 229, 0.28);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">spek<span>.</span>tra</p>
      <h1>You’re offline.</h1>
      <p>Spektra needs a connection to sync content, library, feed, and lists.</p>
      <p>Reconnect and try again.</p>
      <a href="/">Try Spektra again</a>
    </main>
  </body>
</html>
