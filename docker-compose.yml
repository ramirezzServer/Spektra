services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-spektra}
      POSTGRES_USER: ${DB_USERNAME:-spektra_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-spektra_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file: ./apps/api/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-spektra}
      DB_USERNAME: ${DB_USERNAME:-spektra_user}
      DB_PASSWORD: ${DB_PASSWORD:-spektra_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on: [postgres, redis]
    volumes:
      - ./apps/api:/var/www/html

  worker:
    build: ./apps/worker
    ports:
      - "8001:8001"
    env_file: ./apps/worker/.env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-spektra_user}:${DB_PASSWORD:-spektra_pass}@postgres:5432/${DB_DATABASE:-spektra}
    depends_on: [postgres]
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload --no-server-header

  web:
    build: ./apps/web
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
