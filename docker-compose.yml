services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spektra
      POSTGRES_USER: spektra_user
      POSTGRES_PASSWORD: spektra_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file: ./apps/api/.env
    depends_on: [postgres, redis]
    volumes:
      - ./apps/api:/var/www/html

  worker:
    build: ./apps/worker
    ports:
      - "8001:8001"
    env_file: ./apps/worker/.env
    depends_on: [postgres]
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload --no-server-header

  web:
    build: ./apps/web
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
