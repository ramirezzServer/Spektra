services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-spektra}
      POSTGRES_USER: ${DB_USERNAME:-spektra_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-spektra_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles: ["local-db"]

  redis:
    image: redis:7-alpine

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    depends_on:
      - redis
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8000/api/health') ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./apps/worker
    env_file:
      - ./apps/worker/.env
    depends_on:
      - redis
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"

volumes:
  pgdata:
