version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-spektra}
      POSTGRES_USER: ${DB_USERNAME:-spektra_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  api:
    build: ./apps/api
    env_file: ./apps/api/.env
    depends_on: [postgres, redis]
    ports:
      - "8000:8000"

  worker:
    build: ./apps/worker
    env_file: ./apps/worker/.env
    depends_on: [postgres, redis]
    ports:
      - "8001:8001"

  web:
    build: ./apps/web
    ports:
      - "5173:5173"

volumes:
  pgdata:
