name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm test -- --run

  api:
    name: API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: spektra_test
          POSTGRES_USER: spektra_user
          POSTGRES_PASSWORD: spektra_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spektra_user -d spektra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: spektra_test
      DB_USERNAME: spektra_user
      DB_PASSWORD: spektra_pass
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      MAIL_MAILER: array
      TMDB_API_KEY: ''
      RAWG_API_KEY: ''
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, mbstring, bcmath, redis
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --no-check-publish
      - run: composer pint:test
      - run: find app routes config -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: php artisan migrate --force
      - run: php artisan test

  worker:
    name: Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/worker/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py jobs/sync_trending.py jobs/refresh_ratings.py db/connection.py
      - run: pytest

  scripts:
    name: Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: for file in scripts/*.mjs; do node --check "$file"; done

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check scripts/check-headers.mjs
      - run: node scripts/security-audit-check.mjs

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare local-only env files for config validation
        run: |
          cp apps/api/.env.example apps/api/.env
          cp apps/worker/.env.example apps/worker/.env
          cp apps/web/.env.example apps/web/.env
      - run: docker compose -f docker-compose.yml config --quiet
      - run: docker compose -f docker-compose.yml -f docker-compose.expose.yml config --quiet
      - run: docker compose -f docker-compose.prod.yml --profile local-db config --quiet
